<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fishing In The Deep</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ── Reset & Mobile Lockdown ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  touch-action: none; -webkit-touch-callout: none; user-select: none;
  background: #0a1628;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
canvas { display: block; width: 100%; height: 100%; touch-action: none; }

/* ── HUD Container ── */
#hud {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
}
#hud > * { pointer-events: auto; }

/* ── Coin Counter ── */
#coin-counter {
  position: absolute; top: 3vh; left: 4vw;
  background: rgba(0,0,0,0.5); border-radius: 20px; padding: 6px 16px;
  display: flex; align-items: center; gap: 8px;
  font-size: clamp(16px, 4vw, 24px); color: #FFD700; font-weight: 700;
  border: 2px solid rgba(255,215,0,0.3);
  transition: transform 0.2s;
}
#coin-counter .coin-icon {
  width: clamp(20px, 5vw, 30px); height: clamp(20px, 5vw, 30px);
  background: #FFD700; border-radius: 50%; border: 2px solid #B8860B;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(10px, 2.5vw, 16px); color: #8B6914; font-weight: 900;
}
#coin-counter.bump { transform: scale(1.2); }

/* ── Fish Counter ── */
#fish-counter {
  position: absolute; top: 3vh; left: 4vw;
  background: rgba(0,0,0,0.5); border-radius: 20px; padding: 6px 16px;
  display: none; align-items: center; gap: 8px;
  font-size: clamp(16px, 4vw, 24px); color: #6CB4EE; font-weight: 700;
  border: 2px solid rgba(108,180,238,0.3);
}
#fish-counter .fill-bar-bg {
  width: clamp(60px, 20vw, 120px); height: 10px;
  background: rgba(255,255,255,0.15); border-radius: 5px; overflow: hidden;
}
#fish-counter .fill-bar {
  height: 100%; width: 0%; background: #6CB4EE; border-radius: 5px;
  transition: width 0.3s ease-out;
}

/* ── Round Indicator ── */
#round-indicator {
  position: absolute; top: 3vh; right: 4vw;
  background: rgba(0,0,0,0.5); border-radius: 20px; padding: 6px 14px;
  font-size: clamp(12px, 3vw, 18px); color: rgba(255,255,255,0.7); font-weight: 600;
  border: 2px solid rgba(255,255,255,0.15);
}

/* ── Bottom Panel ── */
#bottom-panel {
  position: absolute; bottom: 3vh; left: 0; width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 0 4vw;
}

/* ── Upgrades Row ── */
#upgrades { display: flex; gap: clamp(8px, 2vw, 16px); width: 100%; justify-content: center; }
.upgrade-btn {
  flex: 1; max-width: 180px; min-height: 44px;
  background: rgba(0,80,160,0.6); border: 2px solid rgba(108,180,238,0.4);
  border-radius: 12px; color: #fff; font-weight: 700;
  font-size: clamp(11px, 2.8vw, 15px); cursor: pointer;
  padding: 6px 8px; text-align: center; line-height: 1.3;
  transition: background 0.2s, transform 0.1s, opacity 0.2s;
}
.upgrade-btn:active { transform: scale(0.95); }
.upgrade-btn.affordable { background: rgba(0,120,200,0.7); border-color: rgba(108,180,238,0.7); }
.upgrade-btn.maxed { opacity: 0.4; cursor: default; }
.upgrade-btn .cost { color: #FFD700; }

/* ── Gauge ── */
#gauge-container { width: 90%; max-width: 360px; position: relative; height: 30px; }
#gauge-bar {
  width: 100%; height: 16px; border-radius: 8px; margin-top: 7px;
  background: linear-gradient(to right, #cc3333, #33cc33, #cc3333);
  border: 2px solid rgba(255,255,255,0.2);
  position: relative; overflow: visible;
}
#gauge-pointer {
  position: absolute; top: -6px; width: 6px; height: 28px;
  background: #fff; border-radius: 3px;
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
  transform: translateX(-50%); left: 50%;
}
#gauge-depth-label {
  text-align: center; color: rgba(255,255,255,0.7);
  font-size: clamp(10px, 2.5vw, 14px); margin-top: 2px; font-weight: 600;
}

/* ── Play Button ── */
#play-btn {
  width: clamp(140px, 40vw, 200px); min-height: 50px;
  background: linear-gradient(135deg, #1a8a1a, #0d6b0d);
  border: 3px solid rgba(100,255,100,0.4); border-radius: 16px;
  color: #fff; font-size: clamp(18px, 5vw, 26px); font-weight: 800;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,180,0,0.3);
  transition: transform 0.1s, box-shadow 0.2s;
}
#play-btn:active { transform: scale(0.93); }

/* ── Tutorial Overlay ── */
#tutorial-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.3); pointer-events: none;
}
#tutorial-overlay .tutorial-text {
  color: #fff; font-size: clamp(18px, 5vw, 28px); font-weight: 700;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8); text-align: center;
  animation: tutPulse 1s ease-in-out infinite alternate;
}
@keyframes tutPulse { from { transform: scale(1); } to { transform: scale(1.05); } }

/* ── Summary Overlay ── */
#summary-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,10,30,0.6); pointer-events: none; gap: 8px;
}
.fish-reveal {
  font-size: clamp(18px, 5vw, 28px); font-weight: 700; color: #fff;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.3s, transform 0.3s;
}
.fish-reveal.show { opacity: 1; transform: translateY(0); }
.fish-reveal .rarity { font-style: italic; margin-left: 8px; }
.total-line {
  font-size: clamp(24px, 7vw, 40px); font-weight: 800; color: #FFD700;
  margin-top: 12px; opacity: 0; transition: opacity 0.4s;
}
.total-line.show { opacity: 1; }

/* ── End Screen ── */
#end-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,10,30,0.75);
}
#cta-btn {
  padding: 16px 40px; min-height: 56px;
  background: linear-gradient(135deg, #ff6b1a, #e04500);
  border: 3px solid rgba(255,200,100,0.5); border-radius: 20px;
  color: #fff; font-size: clamp(20px, 6vw, 32px); font-weight: 800;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 6px 30px rgba(255,100,0,0.4);
  animation: ctaPulse 2s ease-in-out infinite;
}
@keyframes ctaPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 6px 30px rgba(255,100,0,0.4); }
  50% { transform: scale(1.06); box-shadow: 0 8px 40px rgba(255,100,0,0.6); }
}

/* ── Floating Text ── */
.float-text {
  position: absolute; pointer-events: none; font-weight: 800;
  font-size: clamp(16px, 4vw, 24px); text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  animation: floatUp 1s ease-out forwards; z-index: 100;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  70% { opacity: 1; transform: translateY(-40px) scale(1.1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.9); }
}
.float-text.rarity-text {
  font-size: clamp(20px, 5vw, 30px);
  animation: rarityPop 1.2s ease-out forwards;
}
@keyframes rarityPop {
  0% { opacity: 0; transform: scale(0.3); }
  20% { opacity: 1; transform: scale(1.3); }
  40% { opacity: 1; transform: scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: scale(1) translateY(-20px); }
}
</style>
</head>
<body>

<div id="hud">
  <div id="coin-counter">
    <div class="coin-icon">$</div>
    <span id="coin-value">100</span>
  </div>
  <div id="fish-counter">
    <span>🐟</span>
    <span id="fish-value">0/6</span>
    <div class="fill-bar-bg"><div class="fill-bar" id="fish-fill"></div></div>
  </div>
  <div id="round-indicator">Round <span id="round-value">1</span>/3</div>

  <div id="bottom-panel">
    <div id="upgrades">
      <button class="upgrade-btn" id="upgrade-fish">Max Fish: 6<br><span class="cost">50🪙 → 7</span></button>
      <button class="upgrade-btn" id="upgrade-depth">Max Depth: 5m<br><span class="cost">50🪙 → 10m</span></button>
    </div>
    <div id="gauge-container">
      <div id="gauge-bar"><div id="gauge-pointer"></div></div>
      <div id="gauge-depth-label">Depth: 5.0m</div>
    </div>
    <button id="play-btn">CAST!</button>
  </div>

  <div id="tutorial-overlay"><div class="tutorial-text">⬅ Drag to catch fish ➡</div></div>
  <div id="summary-overlay"></div>
  <div id="end-screen"><button id="cta-btn">Download Now!</button></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// §1  CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════

const FISH_UPGRADES = [
  { value: 6, cost: 0 }, { value: 7, cost: 50 }, { value: 8, cost: 100 },
  { value: 9, cost: 200 }, { value: 10, cost: 400 },
];
const DEPTH_UPGRADES = [
  { value: 5, cost: 0 }, { value: 10, cost: 50 }, { value: 15, cost: 75 },
  { value: 20, cost: 150 }, { value: 30, cost: 300 },
];
const FISH_TYPES = [
  { id:"common",   value:5,   color:0x6CB4EE, minDepth:0,  weight:50, rarity:null,         scale:1.0  },
  { id:"uncommon", value:10,  color:0x3CB371, minDepth:3,  weight:30, rarity:null,         scale:1.1  },
  { id:"rare",     value:25,  color:0xDA70D6, minDepth:8,  weight:12, rarity:"Rare!",      scale:1.2  },
  { id:"amazing",  value:50,  color:0xFFD700, minDepth:14, weight:6,  rarity:"Amazing!",   scale:1.35 },
  { id:"legendary",value:100, color:0xFF4500, minDepth:22, weight:2,  rarity:"Legendary!", scale:1.5  },
];
const RARITY_COLORS = { "Rare!":"#DA70D6", "Amazing!":"#FFD700", "Legendary!":"#FF4500" };

const HOOK_SPEED = 3;
const CATCH_RADIUS = 0.8;
const PLAY_AREA_X = 2.5;
const FISH_SPAWN_MULT = 3;
const DRAG_SENSITIVITY = 1.8;

// ═══════════════════════════════════════════════════════
// §2  THREE.JS SETUP
// ═══════════════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a1628);
document.body.insertBefore(renderer.domElement, document.getElementById('hud'));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x051530, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1, 8);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x4488cc, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(2, 5, 5);
scene.add(dirLight);

// Ocean background
const bgGeo = new THREE.PlaneGeometry(30, 120, 1, 40);
const bgColArr = [];
const bgPos = bgGeo.getAttribute('position');
for (let i = 0; i < bgPos.count; i++) {
  const t = THREE.MathUtils.clamp((bgPos.getY(i) + 60) / 120, 0, 1);
  bgColArr.push(
    THREE.MathUtils.lerp(0.02, 0.2, t),
    THREE.MathUtils.lerp(0.06, 0.5, t),
    THREE.MathUtils.lerp(0.15, 0.8, t)
  );
}
bgGeo.setAttribute('color', new THREE.Float32BufferAttribute(bgColArr, 3));
const bgMesh = new THREE.Mesh(bgGeo, new THREE.MeshBasicMaterial({ vertexColors: true }));
bgMesh.position.set(0, -25, -5);
scene.add(bgMesh);

// Surface band
const surfMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 1.5),
  new THREE.MeshBasicMaterial({ color: 0x66ccee, transparent: true, opacity: 0.25 })
);
surfMesh.position.set(0, 0.5, -4);
scene.add(surfMesh);

// Depth markers
for (let d = 5; d <= 35; d += 5) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 48;
  const cx = c.getContext('2d');
  cx.fillStyle = 'rgba(255,255,255,0.25)';
  cx.font = 'bold 28px sans-serif';
  cx.textAlign = 'center';
  cx.fillText(d + 'm', 64, 34);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true }));
  sp.position.set(-PLAY_AREA_X - 1.5, -d, -2);
  sp.scale.set(2, 0.75, 1);
  scene.add(sp);
}

// Bubble particles (ambient decoration)
const BUBBLE_COUNT = 60;
const bubbleGeo = new THREE.BufferGeometry();
const bubblePos = new Float32Array(BUBBLE_COUNT * 3);
const bubbleSpeeds = new Float32Array(BUBBLE_COUNT);
for (let i = 0; i < BUBBLE_COUNT; i++) {
  bubblePos[i*3]   = (Math.random() - 0.5) * 12;
  bubblePos[i*3+1] = -Math.random() * 40;
  bubblePos[i*3+2] = -2 + Math.random() * 4;
  bubbleSpeeds[i]  = 0.2 + Math.random() * 0.5;
}
bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePos, 3));
const bubbleMat = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.12, transparent: true, opacity: 0.4 });
const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
scene.add(bubbles);

function updateBubbles(dt) {
  const pos = bubbles.geometry.getAttribute('position');
  for (let i = 0; i < BUBBLE_COUNT; i++) {
    pos.array[i*3+1] += bubbleSpeeds[i] * dt;
    pos.array[i*3]   += Math.sin(gameTime * 2 + i) * 0.003;
    if (pos.array[i*3+1] > 2) {
      pos.array[i*3+1] = -35 - Math.random() * 5;
      pos.array[i*3]   = (Math.random() - 0.5) * 12;
    }
  }
  pos.needsUpdate = true;
}

// ═══════════════════════════════════════════════════════
// §3  STATE MACHINE & PLAYER STATE
// ═══════════════════════════════════════════════════════

const S = { READY:'READY', DESCENDING:'DESCENDING', TUTORIAL:'TUTORIAL', FISHING:'FISHING', REEL:'REEL', SUMMARY:'SUMMARY', END:'END' };
let state = S.READY;
let stateTimer = 0;

const player = { coins: 100, round: 0, maxFish: 6, maxDepth: 5, fishLevel: 0, depthLevel: 0 };

// ═══════════════════════════════════════════════════════
// §4  INPUT MANAGER
// ═══════════════════════════════════════════════════════

let dragActive = false, dragStartX = 0, hookStartX = 0;

renderer.domElement.addEventListener('pointerdown', e => {
  if (state === S.FISHING || state === S.REEL) {
    dragActive = true; dragStartX = e.clientX; hookStartX = hookGroup.position.x;
    e.preventDefault();
  }
});
renderer.domElement.addEventListener('pointermove', e => {
  if (!dragActive) return;
  const dx = (e.clientX - dragStartX) / window.innerWidth * PLAY_AREA_X * 2 * DRAG_SENSITIVITY;
  hookGroup.position.x = THREE.MathUtils.clamp(hookStartX + dx, -PLAY_AREA_X, PLAY_AREA_X);
  e.preventDefault();
});
const endDrag = () => { dragActive = false; };
renderer.domElement.addEventListener('pointerup', endDrag);
renderer.domElement.addEventListener('pointercancel', endDrag);
renderer.domElement.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

// ═══════════════════════════════════════════════════════
// §5  MESH FACTORIES
// ═══════════════════════════════════════════════════════

// Shared geos
const fishBodyGeo = new THREE.SphereGeometry(0.3, 10, 8);
fishBodyGeo.scale(1.4, 1, 0.8);
const fishTailGeo = new THREE.ConeGeometry(0.2, 0.35, 6);
fishTailGeo.rotateZ(Math.PI / 2);
const fishFinGeo = new THREE.ConeGeometry(0.08, 0.2, 4);
const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
const pupilGeo = new THREE.SphereGeometry(0.035, 6, 6);
const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

function createFishMesh(ft) {
  const g = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({
    color: ft.color,
    emissive: ft.rarity ? ft.color : 0x000000,
    emissiveIntensity: ft.rarity ? 0.3 : 0,
    shininess: 60,
  });
  g.add(new THREE.Mesh(fishBodyGeo, mat));
  const tail = new THREE.Mesh(fishTailGeo, mat);
  tail.position.x = -0.5;
  g.add(tail);
  const fin = new THREE.Mesh(fishFinGeo, mat);
  fin.position.set(0, 0.28, 0);
  g.add(fin);
  const eye = new THREE.Mesh(eyeGeo, eyeMat);
  eye.position.set(0.28, 0.1, 0.2);
  g.add(eye);
  const pupil = new THREE.Mesh(pupilGeo, pupilMat);
  pupil.position.set(0.32, 0.1, 0.24);
  g.add(pupil);
  g.scale.setScalar(ft.scale);
  return g;
}

// Hook
const hookGroup = new THREE.Group();
const hookMat = new THREE.MeshPhongMaterial({ color: 0x999999, shininess: 100 });
const hArc = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.03, 8, 12, Math.PI), hookMat);
hArc.rotation.z = Math.PI;
hookGroup.add(hArc);
const hBarb = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3, 6), hookMat);
hBarb.position.set(0.18, 0.15, 0);
hookGroup.add(hBarb);
const hPoint = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.1, 6), hookMat);
hPoint.position.set(0, -0.2, 0);
hookGroup.add(hPoint);
hookGroup.position.set(0, 1.5, 0);
hookGroup.userData = { targetDepth: 0, caughtFish: [] };
scene.add(hookGroup);

// Fisherman
const fmGroup = new THREE.Group();
const fmBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), new THREE.MeshPhongMaterial({ color: 0x2255aa }));
fmBody.position.set(0, 0.4, 0); fmGroup.add(fmBody);
const fmHead = new THREE.Mesh(new THREE.SphereGeometry(0.25, 10, 8), new THREE.MeshPhongMaterial({ color: 0xffcc88 }));
fmHead.position.set(0, 1.05, 0); fmGroup.add(fmHead);
const hatMat = new THREE.MeshPhongMaterial({ color: 0x884422 });
const hatBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.05, 12), hatMat);
hatBrim.position.set(0, 1.25, 0); fmGroup.add(hatBrim);
const hatTop = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 0.2, 12), hatMat);
hatTop.position.set(0, 1.38, 0); fmGroup.add(hatTop);
const rodMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.02, 3, 6), new THREE.MeshPhongMaterial({ color: 0x664422 }));
rodMesh.position.set(0.4, 1.6, 0); rodMesh.rotation.z = -0.6; fmGroup.add(rodMesh);
fmGroup.position.set(-1.5, 0.5, 0);
scene.add(fmGroup);

// Fishing line
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
const fishingLine = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.6 }));
scene.add(fishingLine);

function updateLine() {
  const p = fishingLine.geometry.getAttribute('position');
  // Rod tip approximation
  p.setXYZ(0, fmGroup.position.x + 1.6, fmGroup.position.y + 2.8, 0);
  p.setXYZ(1, hookGroup.position.x, hookGroup.position.y + 0.3, 0);
  p.needsUpdate = true;
}

// ═══════════════════════════════════════════════════════
// §6  GAUGE
// ═══════════════════════════════════════════════════════

const gauge = { t: 0, speed: 0.6, stopped: false };

function gaugeDepth() {
  const e = (Math.sin(gauge.t * Math.PI * 2 - Math.PI / 2) + 1) / 2;
  const minD = Math.max(0, player.maxDepth - 2);
  return minD + e * (player.maxDepth - minD);
}

function updateGauge(dt) {
  if (gauge.stopped) return;
  gauge.t += dt * gauge.speed;
  const e = (Math.sin(gauge.t * Math.PI * 2 - Math.PI / 2) + 1) / 2;
  document.getElementById('gauge-pointer').style.left = (e * 100) + '%';
  document.getElementById('gauge-depth-label').textContent = 'Depth: ' + gaugeDepth().toFixed(1) + 'm';
}

// ═══════════════════════════════════════════════════════
// §7  FISH SPAWNER
// ═══════════════════════════════════════════════════════

let activeFish = [];

function spawnFish(targetDepth) {
  activeFish.forEach(f => scene.remove(f.mesh));
  activeFish = [];
  const total = player.maxFish * FISH_SPAWN_MULT;
  for (let i = 0; i < total; i++) {
    const depth = (i / total) * targetDepth + Math.random() * (targetDepth / total) * 0.8;
    const eligible = FISH_TYPES.filter(ft => ft.minDepth <= depth);
    const tw = eligible.reduce((s, ft) => s + ft.weight, 0);
    let r = Math.random() * tw, chosen = eligible[0];
    for (const ft of eligible) { r -= ft.weight; if (r <= 0) { chosen = ft; break; } }
    const mesh = createFishMesh(chosen);
    const x = (Math.random() - 0.5) * PLAY_AREA_X * 2;
    const dir = Math.random() > 0.5 ? 1 : -1;
    mesh.position.set(x, -depth, (Math.random() - 0.5) * 1.5);
    mesh.scale.x *= dir;
    scene.add(mesh);
    activeFish.push({ type: chosen, mesh, x, y: -depth, vx: (0.3 + Math.random() * 0.5) * dir, dir, caught: false, bob: Math.random() * Math.PI * 2 });
  }
}

function updateFishAI(dt, time) {
  for (const f of activeFish) {
    if (f.caught) continue;
    f.x += f.vx * dt;
    if (f.x > PLAY_AREA_X) { f.vx = -Math.abs(f.vx); f.dir = -1; f.mesh.scale.x = -Math.abs(f.mesh.scale.x); }
    if (f.x < -PLAY_AREA_X) { f.vx = Math.abs(f.vx); f.dir = 1; f.mesh.scale.x = Math.abs(f.mesh.scale.x); }
    f.mesh.position.x = f.x;
    f.mesh.position.y = f.y + Math.sin(time * 2 + f.bob) * 0.05;
    f.mesh.rotation.y = Math.sin(time * 4 + f.bob) * 0.15;
  }
}

// ═══════════════════════════════════════════════════════
// §8  COLLISION
// ═══════════════════════════════════════════════════════

const _v2a = new THREE.Vector2(), _v2b = new THREE.Vector2();

function checkCatches() {
  const caught = hookGroup.userData.caughtFish;
  if (caught.length >= player.maxFish) return;
  _v2a.set(hookGroup.position.x, hookGroup.position.y);
  for (const f of activeFish) {
    if (f.caught) continue;
    _v2b.set(f.mesh.position.x, f.mesh.position.y);
    if (_v2a.distanceTo(_v2b) < CATCH_RADIUS) {
      f.caught = true;
      caught.push(f);
      updateFishCounter(caught.length);
      spawnFloatText('+' + f.type.value + '🪙', '#FFD700', f.mesh.position);
      if (f.type.rarity) {
        cameraShake = f.type.id === 'legendary' ? 1.0 : 0.3;
        setTimeout(() => spawnFloatText(f.type.rarity, RARITY_COLORS[f.type.rarity], f.mesh.position, true), 200);
      }
      if (caught.length >= player.maxFish) { setState(S.REEL); return; }
    }
  }
}

// ═══════════════════════════════════════════════════════
// §9  CAMERA
// ═══════════════════════════════════════════════════════

let cameraTargetY = 1, cameraShake = 0;

function updateCamera(dt) {
  camera.position.y += (cameraTargetY - camera.position.y) * Math.min(1, dt * 5);
  if (cameraShake > 0) {
    camera.position.x = (Math.random() - 0.5) * cameraShake * 0.3;
    cameraShake = Math.max(0, cameraShake - dt * 4);
  } else {
    camera.position.x *= 0.9; // settle back
  }
  camera.lookAt(0, camera.position.y - 1, 0);
}

// ═══════════════════════════════════════════════════════
// §10  FLOAT TEXT (DOM)
// ═══════════════════════════════════════════════════════

function worldToScreen(pos) {
  const v = pos.clone().project(camera);
  return { x: (v.x * 0.5 + 0.5) * window.innerWidth, y: (-v.y * 0.5 + 0.5) * window.innerHeight };
}

function spawnFloatText(text, color, worldPos, isRarity) {
  const s = worldToScreen(worldPos);
  const el = document.createElement('div');
  el.className = 'float-text' + (isRarity ? ' rarity-text' : '');
  el.textContent = text;
  el.style.color = color;
  el.style.left = s.x + 'px';
  el.style.top = s.y + 'px';
  document.getElementById('hud').appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// ═══════════════════════════════════════════════════════
// §11  HUD CONTROLLER
// ═══════════════════════════════════════════════════════

const $  = id => document.getElementById(id);
const showCoin  = () => { $('coin-counter').style.display = 'flex'; $('fish-counter').style.display = 'none'; };
const showFish  = () => { $('coin-counter').style.display = 'none'; $('fish-counter').style.display = 'flex'; };
const updCoins  = () => { $('coin-value').textContent = player.coins; };
const updRound  = () => { $('round-value').textContent = player.round + 1; };
const showPanel = v => { $('bottom-panel').style.display = v ? 'flex' : 'none'; };

function bumpCoins() {
  const el = $('coin-counter'); el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

function updateFishCounter(n) {
  $('fish-value').textContent = n + '/' + player.maxFish;
  $('fish-fill').style.width = (n / player.maxFish * 100) + '%';
}

function updUpgrades() {
  // Fish
  const fb = $('upgrade-fish');
  if (player.fishLevel >= FISH_UPGRADES.length - 1) {
    fb.innerHTML = 'Max Fish: ' + player.maxFish + '<br><span class="cost">MAXED</span>';
    fb.className = 'upgrade-btn maxed';
  } else {
    const nx = FISH_UPGRADES[player.fishLevel + 1];
    fb.innerHTML = 'Max Fish: ' + player.maxFish + '<br><span class="cost">' + nx.cost + '🪙 → ' + nx.value + '</span>';
    fb.className = 'upgrade-btn' + (player.coins >= nx.cost ? ' affordable' : '');
  }
  // Depth
  const db = $('upgrade-depth');
  if (player.depthLevel >= DEPTH_UPGRADES.length - 1) {
    db.innerHTML = 'Max Depth: ' + player.maxDepth + 'm<br><span class="cost">MAXED</span>';
    db.className = 'upgrade-btn maxed';
  } else {
    const nx = DEPTH_UPGRADES[player.depthLevel + 1];
    db.innerHTML = 'Max Depth: ' + player.maxDepth + 'm<br><span class="cost">' + nx.cost + '🪙 → ' + nx.value + 'm</span>';
    db.className = 'upgrade-btn' + (player.coins >= nx.cost ? ' affordable' : '');
  }
}

$('upgrade-fish').addEventListener('pointerdown', () => {
  if (state !== S.READY || player.fishLevel >= FISH_UPGRADES.length - 1) return;
  const nx = FISH_UPGRADES[player.fishLevel + 1];
  if (player.coins < nx.cost) return;
  player.coins -= nx.cost; player.fishLevel++; player.maxFish = nx.value;
  updCoins(); updUpgrades();
});
$('upgrade-depth').addEventListener('pointerdown', () => {
  if (state !== S.READY || player.depthLevel >= DEPTH_UPGRADES.length - 1) return;
  const nx = DEPTH_UPGRADES[player.depthLevel + 1];
  if (player.coins < nx.cost) return;
  player.coins -= nx.cost; player.depthLevel++; player.maxDepth = nx.value;
  updCoins(); updUpgrades();
});
$('play-btn').addEventListener('pointerdown', () => {
  if (state !== S.READY) return;
  gauge.stopped = true;
  hookGroup.userData.targetDepth = gaugeDepth();
  hookGroup.userData.caughtFish = [];
  setState(S.DESCENDING);
});
$('cta-btn').addEventListener('pointerdown', () => { window.open('about:blank'); });

// ═══════════════════════════════════════════════════════
// §12  STATE TRANSITIONS
// ═══════════════════════════════════════════════════════

let sumStep = 0, sumTimer = 0, sumFish = [], sumTotal = 0;

function setState(ns) {
  state = ns; stateTimer = 0;
  switch (ns) {
    case S.READY:
      gauge.stopped = false; gauge.t = 0;
      hookGroup.position.set(0, 1.5, 0);
      hookGroup.userData.caughtFish = [];
      showCoin(); showPanel(true); updCoins(); updUpgrades(); updRound();
      updateFishCounter(0); cameraTargetY = 1; fmGroup.visible = true;
      activeFish.forEach(f => scene.remove(f.mesh)); activeFish = [];
      break;
    case S.DESCENDING:
      showFish(); showPanel(false); updateFishCounter(0);
      reachedBottom = false; bottomPauseTimer = 0;
      spawnFish(hookGroup.userData.targetDepth);
      break;
    case S.TUTORIAL:
      $('tutorial-overlay').style.display = 'flex';
      break;
    case S.FISHING:
      $('tutorial-overlay').style.display = 'none';
      break;
    case S.REEL: break;
    case S.SUMMARY:
      sumFish = (hookGroup.userData.caughtFish || []).slice();
      sumStep = 0; sumTimer = 0; sumTotal = 0;
      showCoin();
      const ov = $('summary-overlay'); ov.innerHTML = ''; ov.style.display = 'flex';
      for (const f of sumFish) {
        const d = document.createElement('div'); d.className = 'fish-reveal';
        const c = '#' + f.type.color.toString(16).padStart(6, '0');
        d.innerHTML = '<span style="color:' + c + '">●</span> +' + f.type.value + '🪙' +
          (f.type.rarity ? ' <span class="rarity" style="color:' + (RARITY_COLORS[f.type.rarity]||'#fff') + '">' + f.type.rarity + '</span>' : '');
        ov.appendChild(d);
      }
      const td = document.createElement('div'); td.className = 'total-line'; td.id = 'sum-total'; td.textContent = 'Total: 0🪙';
      ov.appendChild(td);
      break;
    case S.END:
      showPanel(false); $('summary-overlay').style.display = 'none';
      $('end-screen').style.display = 'flex';
      break;
  }
}

// ═══════════════════════════════════════════════════════
// §13  GAME UPDATE
// ═══════════════════════════════════════════════════════

let gameTime = 0;

function moveCaught() {
  const caught = hookGroup.userData.caughtFish;
  for (let i = 0; i < caught.length; i++) {
    caught[i].mesh.position.set(
      hookGroup.position.x + (i % 2 === 0 ? -0.2 : 0.2),
      hookGroup.position.y - (i + 1) * 0.35,
      (i % 3 - 1) * 0.2
    );
    caught[i].mesh.rotation.z = Math.sin(gameTime * 3 + i) * 0.2;
  }
}

function updateSummary(dt) {
  sumTimer += dt;
  const revs = document.querySelectorAll('#summary-overlay .fish-reveal');
  const delay = 0.5;
  if (sumStep < sumFish.length) {
    if (sumTimer >= sumStep * delay + 0.3) {
      revs[sumStep].classList.add('show');
      sumTotal += sumFish[sumStep].type.value;
      sumStep++;
    }
  } else {
    const tel = $('sum-total');
    if (tel && !tel.classList.contains('show')) {
      tel.textContent = 'Total: +' + sumTotal + '🪙'; tel.classList.add('show');
      player.coins += sumTotal;
      setTimeout(() => { updCoins(); bumpCoins(); }, 400);
    }
    if (sumTimer > sumFish.length * delay + 2.5) {
      $('summary-overlay').style.display = 'none';
      (hookGroup.userData.caughtFish || []).forEach(f => scene.remove(f.mesh));
      activeFish.forEach(f => scene.remove(f.mesh)); activeFish = [];
      player.round++;
      setState(player.round >= 3 ? S.END : S.READY);
    }
  }
}

let bottomPauseTimer = 0;
let reachedBottom = false;

function update(dt) {
  gameTime += dt; stateTimer += dt;
  updateBubbles(dt);

  switch (state) {
    case S.READY:
      updateGauge(dt);
      hookGroup.position.set(0, 1.5, 0);
      cameraTargetY = 1;
      break;

    case S.DESCENDING: {
      const tgt = -hookGroup.userData.targetDepth;
      if (!reachedBottom) {
        hookGroup.position.y -= HOOK_SPEED * dt;
        // Slight sway while descending
        hookGroup.position.x = Math.sin(gameTime * 1.5) * 0.15;
        if (hookGroup.position.y <= tgt) {
          hookGroup.position.y = tgt;
          reachedBottom = true;
          bottomPauseTimer = 0;
        }
      } else {
        bottomPauseTimer += dt;
        if (player.round === 0 && !hookGroup.userData.tutorialDone) {
          if (bottomPauseTimer >= 0.3) {
            hookGroup.userData.tutorialDone = true;
            setState(S.TUTORIAL);
            reachedBottom = false;
          }
        } else {
          if (bottomPauseTimer >= 0.7) {
            setState(S.FISHING);
            reachedBottom = false;
          }
        }
      }
      cameraTargetY = hookGroup.position.y + 2;
      updateFishAI(dt, gameTime);
      break;
    }

    case S.TUTORIAL:
      updateFishAI(dt, gameTime);
      if (stateTimer >= 2.0) setState(S.FISHING);
      break;

    case S.FISHING:
      hookGroup.position.y += HOOK_SPEED * dt;
      if (hookGroup.position.y >= 1.5) { hookGroup.position.y = 1.5; setState(S.SUMMARY); break; }
      moveCaught(); checkCatches();
      cameraTargetY = hookGroup.position.y + 2;
      updateFishAI(dt, gameTime);
      break;

    case S.REEL:
      hookGroup.position.y += HOOK_SPEED * 2.5 * dt;
      if (hookGroup.position.y >= 1.5) { hookGroup.position.y = 1.5; setState(S.SUMMARY); break; }
      moveCaught();
      cameraTargetY = hookGroup.position.y + 2;
      updateFishAI(dt, gameTime);
      break;

    case S.SUMMARY:
      updateSummary(dt);
      cameraTargetY = 1;
      break;

    case S.END:
      cameraTargetY = 1;
      break;
  }

  updateCamera(dt);
  updateLine();
}

// ═══════════════════════════════════════════════════════
// §14  GAME LOOP & INIT
// ═══════════════════════════════════════════════════════

let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 100));

// Go
updCoins(); updUpgrades(); updRound(); showCoin(); showPanel(true);
setState(S.READY);
requestAnimationFrame(loop);
</script>
